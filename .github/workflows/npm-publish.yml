name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, for example v0.2.1"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Show publish tool versions
        run: |
          node --version
          npm --version

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like vMAJOR.MINOR.PATCH, got: $TAG_NAME" >&2
            exit 1
          fi

          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null; then
            echo "Ref must be an existing git tag, got: $TAG_NAME" >&2
            exit 1
          fi

          git fetch --force --depth=1 origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"
          TAG_COMMIT="$(git rev-list -n 1 "refs/tags/$TAG_NAME")"
          git checkout --detach "$TAG_COMMIT"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [[ "$HEAD_COMMIT" != "$TAG_COMMIT" ]]; then
            echo "Checked out ref $HEAD_COMMIT does not match tag $TAG_NAME at $TAG_COMMIT" >&2
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "v$PACKAGE_VERSION" != "$TAG_NAME" ]]; then
            echo "package.json version $PACKAGE_VERSION does not match tag $TAG_NAME" >&2
            exit 1
          fi

      - name: Check package
        run: npm run check

      - name: Test package
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Skip if version already exists
        id: published
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "Package $PACKAGE_NAME@$PACKAGE_VERSION already exists on npm; skipping publish."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.published.outputs.already_published != 'true'
        run: npm publish --access public --provenance --registry=https://registry.npmjs.org/
